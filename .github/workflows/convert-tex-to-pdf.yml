name: Build the .tex file to PDF

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  container:
    runs-on: ubuntu-latest
    container: kjarosh/latex:2024.4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build the tex file
        run: cd docs/tex && latexmk -pdf -output-directory=../../out main.tex

      - name: Upload document
        uses: actions/upload-artifact@v4
        with:
          name: tex-pdf
          path: out/main.pdf
          if-no-files-found: error

      - name: Upload Latex build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tex-build-logs
          path: out/
